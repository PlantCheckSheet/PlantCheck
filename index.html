<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Plant Pre-Start Inspection</title>

<style>
*{
  box-sizing:border-box;
  font-family:"Segoe UI", Arial, sans-serif;
}

:root{
  --bgImage:url("excavator.jpg");
  --primary:#f4b400;
  --primary-dark:#c99200;
  --success:#1f8f4e;
  --danger:#c0392b;
  --text:#1f2933;
  --muted:#5b6770;
  --border:#d8dee4;
  --panel:#ffffff;
  --panel-soft:rgba(255,255,255,0.96);
  --shadow:0 12px 30px rgba(0,0,0,0.18);
}

body{
  margin:0;
  color:white;
  min-height:100vh;
  background:#3f454b;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(15,23,42,0.72), rgba(15,23,42,0.78)),
    var(--bgImage);
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  z-index:-2;
  transition:background-image .4s ease;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  background:linear-gradient(to bottom, rgba(255,255,255,0.03), rgba(0,0,0,0.12));
  z-index:-1;
}

.app-header{
  background:linear-gradient(90deg, rgba(244,180,0,0.96), rgba(224,164,0,0.96));
  color:#111;
  padding:18px 24px;
  border-bottom:3px solid rgba(0,0,0,0.14);
  box-shadow:0 6px 18px rgba(0,0,0,0.14);
}

/* UPDATED HEADER ALIGNMENT */

.header-inner{
  max-width:860px;
  margin:0 auto;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  gap:6px;
}

.header-title{
  display:flex;
  flex-direction:column;
  gap:4px;
  align-items:center;
  text-align:center;
}

.header-title h1{
  margin:0;
  font-size:24px;
  line-height:1.2;
  letter-spacing:0.2px;
}

.header-title p{
  margin:0;
  font-size:13px;
  font-weight:600;
  color:#2f2f2f;
  letter-spacing:0.4px;
  text-transform:uppercase;
}

.header-badge{
  background:rgba(255,255,255,0.24);
  border:1px solid rgba(0,0,0,0.12);
  border-radius:999px;
  padding:8px 14px;
  font-size:12px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.7px;
}

.container{
  max-width:860px;
  margin:28px auto;
  padding:0 20px 28px;
}

/* (all remaining CSS unchanged) */

.form-shell{
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:18px;
  padding:18px;
  backdrop-filter:blur(4px);
}

.card{
  background:var(--panel-soft);
  color:var(--text);
  border-radius:14px;
  padding:20px;
  margin-bottom:18px;
  border:1px solid rgba(15,23,42,0.08);
  box-shadow:var(--shadow);
}

.card h2{
  margin:0 0 16px 0;
  font-size:18px;
  border-bottom:2px solid var(--primary);
  padding-bottom:8px;
}

.card-intro{
  margin:-6px 0 14px 0;
  color:var(--muted);
  font-size:14px;
}

.form-grid{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:14px;
}

.form-group{
  display:flex;
  flex-direction:column;
}

label{
  font-weight:700;
  display:block;
  color:#24313d;
  margin-bottom:6px;
  font-size:14px;
}

input, select, textarea{
  width:100%;
  padding:12px 13px;
  border-radius:10px;
  border:1px solid var(--border);
  font-size:15px;
}

textarea{
  min-height:120px;
}

.check-list{
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  background:#fff;
}

.check-item{
  display:grid;
  grid-template-columns:1fr auto;
  align-items:center;
  padding:14px 16px;
  border-bottom:1px solid #e8edf2;
}

.btn-group{
  display:flex;
  gap:10px;
}

.status-btn{
  border:2px solid #cfd8df;
  background:#fff;
  padding:10px 16px;
  border-radius:10px;
  font-weight:800;
  cursor:pointer;
  min-width:96px;
}

.status-btn.selected-ok{
  background:rgba(31,143,78,0.1);
  border-color:var(--success);
  color:var(--success);
}

.status-btn.selected-defect{
  background:rgba(192,57,43,0.1);
  border-color:var(--danger);
  color:var(--danger);
}

.submit-btn{
  width:100%;
  background:linear-gradient(90deg, var(--primary), #df9f00);
  color:#111;
  border:none;
  padding:16px;
  border-radius:12px;
  font-size:18px;
  font-weight:800;
  cursor:pointer;
}

.footer{
  text-align:center;
  font-size:12px;
  padding:10px 12px 22px;
  color:rgba(255,255,255,0.78);
}

.success-popup{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#1f8f4e;
  color:white;
  padding:20px 28px;
  border-radius:12px;
  font-weight:700;
  font-size:18px;
  display:none;
}

</style>
</head>

<body>

<div class="app-header">
  <div class="header-inner">
    <div class="header-title">
      <p>Site Safety Inspection Record</p>
      <h1>Plant Pre-Start Inspection</h1>
    </div>
    <div class="header-badge">Daily Operator Check</div>
  </div>
</div>

<!-- rest of your HTML remains unchanged -->

</body>
</html>

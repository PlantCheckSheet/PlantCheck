<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plant Pre-Start Inspection</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      margin: 0;
      color: white;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      background-color: #4b4b4b;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.65)),
        url("excavator.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: -1;
      transition: background-image 0.3s ease;
    }

    .app-header {
      background: rgba(244,180,0,0.9);
      color: #111;
      padding: 18px;
      text-align: center;
      font-weight: 700;
      font-size: 22px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.35);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .container {
      max-width: 760px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.82);
      color: #333;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 20px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.30);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.35);
    }

    .card h2 {
      margin-top: 0;
      border-bottom: 2px solid #f4b400;
      padding-bottom: 6px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-top: 6px;
      margin-bottom: 12px;
      font-size: 15px;
      background: rgba(255,255,255,0.92);
      color: #222;
    }

    .check-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(0,0,0,0.1);
    }

    .check-title {
      font-weight: 600;
      flex: 1;
    }

    .btn-group {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn-group button {
      border: none;
      padding: 10px 14px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      min-width: 80px;
      transition: opacity 0.2s ease, transform 0.1s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .btn-group button:active {
      transform: scale(0.98);
    }

    .ok {
      background: #2ecc71;
      color: white;
    }

    .defect {
      background: #e74c3c;
      color: white;
    }

    .submit-btn {
      width: 100%;
      background: #f4b400;
      border: none;
      padding: 16px;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      color: #111;
      box-shadow: 0 10px 24px rgba(0,0,0,0.22);
    }

    .submit-btn:hover {
      background: #ffcc33;
    }

    .success-message {
      display: none;
      background: rgba(46, 204, 113, 0.95);
      color: white;
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 16px;
      font-weight: 600;
      box-shadow: 0 6px 16px rgba(0,0,0,0.2);
    }

    .footer {
      text-align: center;
      font-size: 12px;
      padding: 12px;
      opacity: 0.9;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }

    @media (max-width: 640px) {
      .container {
        padding: 14px;
      }

      .card {
        padding: 16px;
      }

      .check-item {
        flex-direction: column;
        align-items: stretch;
      }

      .btn-group {
        justify-content: stretch;
      }

      .btn-group button {
        flex: 1;
      }
    }
  </style>
</head>
<body>

  <div class="app-header">🚧 Plant Pre-Start Inspection</div>

  <div class="container">
    <div id="successMessage" class="success-message">Inspection submitted successfully.</div>

    <form
      id="inspectionForm"
      method="POST"
      action="https://script.google.com/macros/s/AKfycbxzMHPa2_qNk8Um6kyGfW6s7XVhlJpbN4syt_yZzbll7M11Sas8YcuSWhGqdrpprMHp/exec"
      target="hiddenFrame"
    >
      <div class="card">
        <h2>Operator Details</h2>

        <label for="operator">Operator Name</label>
        <input id="operator" name="operator" required />

        <label for="plantType">Plant Type</label>
        <select id="plantType" name="plantType" required>
          <option value="">Select Plant</option>
          <option value="Excavator">Excavator</option>
          <option value="Dumper">Dumper</option>
          <option value="Roller">Roller</option>
          <option value="Telehandler">Telehandler</option>
          <option value="ADT">ADT</option>
          <option value="Shovel Loader">Shovel Loader</option>
          <option value="Mobile Crane">Mobile Crane</option>
        </select>

        <label for="machineID">Machine ID</label>
        <input id="machineID" name="machineID" required />
      </div>

      <div class="card">
        <h2>Machine Checks</h2>

        <div class="check-item">
          <div class="check-title">Fluid Leaks</div>
          <div class="btn-group">
            <button type="button" class="ok" onclick="setCheck(this,'OK')">OK</button>
            <button type="button" class="defect" onclick="setCheck(this,'Defect')">Defect</button>
            <input type="hidden" name="fluidLeaks" />
          </div>
        </div>

        <div class="check-item">
          <div class="check-title">Hydraulic Hoses</div>
          <div class="btn-group">
            <button type="button" class="ok" onclick="setCheck(this,'OK')">OK</button>
            <button type="button" class="defect" onclick="setCheck(this,'Defect')">Defect</button>
            <input type="hidden" name="hydraulicHoses" />
          </div>
        </div>

        <div class="check-item">
          <div class="check-title">Engine Oil</div>
          <div class="btn-group">
            <button type="button" class="ok" onclick="setCheck(this,'OK')">OK</button>
            <button type="button" class="defect" onclick="setCheck(this,'Defect')">Defect</button>
            <input type="hidden" name="engineOil" />
          </div>
        </div>

        <div class="check-item">
          <div class="check-title">Coolant</div>
          <div class="btn-group">
            <button type="button" class="ok" onclick="setCheck(this,'OK')">OK</button>
            <button type="button" class="defect" onclick="setCheck(this,'Defect')">Defect</button>
            <input type="hidden" name="coolant" />
          </div>
        </div>

        <div class="check-item">
          <div class="check-title">Tracks / Tyres</div>
          <div class="btn-group">
            <button type="button" class="ok" onclick="setCheck(this,'OK')">OK</button>
            <button type="button" class="defect" onclick="setCheck(this,'Defect')">Defect</button>
            <input type="hidden" name="tracks" />
          </div>
        </div>

        <div class="check-item">
          <div class="check-title">Lights</div>
          <div class="btn-group">
            <button type="button" class="ok" onclick="setCheck(this,'OK')">OK</button>
            <button type="button" class="defect" onclick="setCheck(this,'Defect')">Defect</button>
            <input type="hidden" name="lights" />
          </div>
        </div>

        <div class="check-item">
          <div class="check-title">Horn / Alarm</div>
          <div class="btn-group">
            <button type="button" class="ok" onclick="setCheck(this,'OK')">OK</button>
            <button type="button" class="defect" onclick="setCheck(this,'Defect')">Defect</button>
            <input type="hidden" name="alarm" />
          </div>
        </div>

        <div class="check-item">
          <div class="check-title">Controls</div>
          <div class="btn-group">
            <button type="button" class="ok" onclick="setCheck(this,'OK')">OK</button>
            <button type="button" class="defect" onclick="setCheck(this,'Defect')">Defect</button>
            <input type="hidden" name="controls" />
          </div>
        </div>
      </div>

      <div class="card">
        <h2>Defect Notes</h2>
        <textarea name="defectNotes" placeholder="Describe issue if required"></textarea>
      </div>

      <button class="submit-btn" type="submit">Submit Inspection</button>
    </form>
  </div>

  <div class="footer">Plant Inspection System</div>

  <iframe name="hiddenFrame" style="display:none;"></iframe>

  <script>
    const plantImages = {
      Excavator: "excavator.jpg",
      Dumper: "dumper.jpg",
      Roller: "roller.jpg",
      Telehandler: "telehandler.jpg",
      ADT: "adt.jpg",
      "Shovel Loader": "shovel-loader.jpg",
      "Mobile Crane": "mobile-crane.jpg"
    };

    const plantTypeSelect = document.getElementById("plantType");
    const inspectionForm = document.getElementById("inspectionForm");
    const successMessage = document.getElementById("successMessage");

    function updateBackground(image) {
      let dynamicStyle = document.getElementById("dynamic-bg-style");

      if (!dynamicStyle) {
        dynamicStyle = document.createElement("style");
        dynamicStyle.id = "dynamic-bg-style";
        document.head.appendChild(dynamicStyle);
      }

      dynamicStyle.textContent = `
        body::before {
          content: "";
          position: fixed;
          inset: 0;
          background:
            linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.65)),
            url("${image}");
          background-size: cover;
          background-position: center;
          background-repeat: no-repeat;
          z-index: -1;
          transition: background-image 0.3s ease;
        }
      `;
    }

    plantTypeSelect.addEventListener("change", function () {
      const selectedImage = plantImages[this.value] || "excavator.jpg";
      updateBackground(selectedImage);
    });

    function setCheck(btn, value) {
      const container = btn.parentElement;
      const hidden = container.querySelector("input[type='hidden']");
      const buttons = container.querySelectorAll("button");

      hidden.value = value;

      buttons.forEach(button => {
        button.style.opacity = "0.4";
      });

      btn.style.opacity = "1";

      if (value === "Defect") {
        alert("⚠ DEFECT RECORDED\n\nPlease report this to site management.");
      }
    }

    inspectionForm.addEventListener("submit", function () {
      successMessage.style.display = "block";
      successMessage.textContent = "Inspection submitted successfully.";

      setTimeout(() => {
        inspectionForm.reset();

        document.querySelectorAll(".btn-group button").forEach(button => {
          button.style.opacity = "1";
        });

        document.querySelectorAll(".btn-group input[type='hidden']").forEach(input => {
          input.value = "";
        });

        updateBackground("excavator.jpg");
        successMessage.style.display = "none";
      }, 800);
    });
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plant Pre-Start Inspection</title>

<style>

*{
box-sizing:border-box;
font-family:"Segoe UI",Arial,sans-serif;
}

body{
margin:0;
color:white;
min-height:100vh;
position:relative;
overflow-x:hidden;
background:#4b4b4b;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.65)),
url("excavator.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
z-index:-1;
transition:background-image 0.3s ease;
}

.app-header{
background:rgba(244,180,0,0.9);
color:#111;
padding:18px;
text-align:center;
font-weight:700;
font-size:22px;
}

.container{
max-width:760px;
margin:auto;
padding:20px;
}

.card{
background:rgba(255,255,255,0.85);
color:#333;
border-radius:14px;
padding:18px;
margin-bottom:20px;
}

.card h2{
margin-top:0;
border-bottom:2px solid #f4b400;
padding-bottom:6px;
}

label{
font-weight:600;
display:block;
}

input,select,textarea{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
margin-top:6px;
margin-bottom:12px;
font-size:15px;
}

.check-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 0;
border-bottom:1px solid #ddd;
}

.btn-group{
display:flex;
gap:8px;
}

.btn-group button{
border:none;
padding:10px 14px;
border-radius:8px;
font-weight:700;
cursor:pointer;
min-width:80px;
}

.ok{
background:#2ecc71;
color:white;
}

.defect{
background:#e74c3c;
color:white;
}

.submit-btn{
width:100%;
background:#f4b400;
border:none;
padding:16px;
border-radius:10px;
font-size:18px;
font-weight:700;
cursor:pointer;
}

.success-message{
display:none;
background:#2ecc71;
padding:14px;
border-radius:10px;
color:white;
font-weight:600;
margin-bottom:20px;
text-align:center;
}

.footer{
text-align:center;
font-size:12px;
padding:12px;
}

</style>
</head>

<body>

<div class="app-header">🚧 Plant Pre-Start Inspection</div>

<div class="container">

<div id="successMessage" class="success-message">
Inspection submitted successfully ✔
</div>

<form
id="inspectionForm"
method="POST"
action="https://script.google.com/macros/s/AKfycbxzMHPa2_qNk8Um6kyGfW6s7XVhlJpbN4syt_yZzbll7M11Sas8YcuSWhGqdrpprMHp/exec"
target="hiddenFrame">

<div class="card">

<h2>Operator Details</h2>

<label>Operator Name</label>
<input name="operator" required>

<label>Plant Type</label>

<select id="plantType" name="plantType" required>
<option value="">Select Plant</option>
<option value="Excavator">Excavator</option>
<option value="Dumper">Dumper</option>
<option value="Roller">Roller</option>
<option value="Telehandler">Telehandler</option>
<option value="ADT">ADT</option>
<option value="Shovel Loader">Shovel Loader</option>
<option value="Mobile Crane">Mobile Crane</option>
</select>

<label>Machine ID</label>
<input name="machineID" required>

</div>

<div class="card">

<h2>Machine Checks</h2>

<div class="check-item">
<div>Fluid Leaks</div>
<div class="btn-group">
<button type="button" class="ok" onclick="setCheck(this,'OK')">OK</button>
<button type="button" class="defect" onclick="setCheck(this,'Defect')">Defect</button>
<input type="hidden" name="fluidLeaks">
</div>
</div>

<div class="check-item">
<div>Hydraulic Hoses</div>
<div class="btn-group">
<button type="button" class="ok" onclick="setCheck(this,'OK')">OK</button>
<button type="button" class="defect" onclick="setCheck(this,'Defect')">Defect</button>
<input type="hidden" name="hydraulicHoses">
</div>
</div>

<div class="check-item">
<div>Engine Oil</div>
<div class="btn-group">
<button type="button" class="ok" onclick="setCheck(this,'OK')">OK</button>
<button type="button" class="defect" onclick="setCheck(this,'Defect')">Defect</button>
<input type="hidden" name="engineOil">
</div>
</div>

<div class="check-item">
<div>Coolant</div>
<div class="btn-group">
<button type="button" class="ok" onclick="setCheck(this,'OK')">OK</button>
<button type="button" class="defect" onclick="setCheck(this,'Defect')">Defect</button>
<input type="hidden" name="coolant">
</div>
</div>

<div class="check-item">
<div>Tracks / Tyres</div>
<div class="btn-group">
<button type="button" class="ok" onclick="setCheck(this,'OK')">OK</button>
<button type="button" class="defect" onclick="setCheck(this,'Defect')">Defect</button>
<input type="hidden" name="tracks">
</div>
</div>

<div class="check-item">
<div>Lights</div>
<div class="btn-group">
<button type="button" class="ok" onclick="setCheck(this,'OK')">OK</button>
<button type="button" class="defect" onclick="setCheck(this,'Defect')">Defect</button>
<input type="hidden" name="lights">
</div>
</div>

<div class="check-item">
<div>Horn / Alarm</div>
<div class="btn-group">
<button type="button" class="ok" onclick="setCheck(this,'OK')">OK</button>
<button type="button" class="defect" onclick="setCheck(this,'Defect')">Defect</button>
<input type="hidden" name="alarm">
</div>
</div>

<div class="check-item">
<div>Controls</div>
<div class="btn-group">
<button type="button" class="ok" onclick="setCheck(this,'OK')">OK</button>
<button type="button" class="defect" onclick="setCheck(this,'Defect')">Defect</button>
<input type="hidden" name="controls">
</div>
</div>

</div>

<div class="card">
<h2>Defect Notes</h2>
<textarea name="defectNotes"></textarea>
</div>

<button class="submit-btn">Submit Inspection</button>

</form>

</div>

<div class="footer">Plant Inspection System</div>

<iframe name="hiddenFrame" style="display:none;"></iframe>

<script>

const plantImages={
Excavator:"excavator.jpg",
Dumper:"dumper.jpg",
Roller:"roller.jpg",
Telehandler:"telehandler.jpg",
ADT:"adt.jpg",
"Shovel Loader":"shovel-loader.jpg",
"Mobile Crane":"mobile-crane.jpg"
}

const plantType=document.getElementById("plantType")

plantType.addEventListener("change",function(){

const img=plantImages[this.value]||"excavator.jpg"

document.body.style.backgroundImage=
`linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.65)),url(${img})`

})

function setCheck(btn,value){

const container=btn.parentElement
const hidden=container.querySelector("input")
const buttons=container.querySelectorAll("button")

hidden.value=value

buttons.forEach(b=>b.style.opacity=0.4)
btn.style.opacity=1

if(value==="Defect"){
alert("⚠ DEFECT RECORDED\n\nPlease report this to site management.")
}

}

const form=document.getElementById("inspectionForm")
const success=document.getElementById("successMessage")

form.addEventListener("submit",function(e){

success.style.display="block"

setTimeout(()=>{
success.style.display="none"
form.reset()

document.querySelectorAll(".btn-group button").forEach(b=>b.style.opacity=1)
document.querySelectorAll("input[type='hidden']").forEach(i=>i.value="")

document.body.style.backgroundImage=
`linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.65)),url(excavator.jpg)`

},2000)

})

</script>

</body>
</html>

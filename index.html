<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Plant Pre-Start Inspection</title>

<style>
*{
  box-sizing:border-box;
  font-family:"Segoe UI", Arial, sans-serif;
}

:root{
  --bgImage:url("excavator.jpg");
  --primary:#f4b400;
  --primary-dark:#c99200;
  --success:#1f8f4e;
  --danger:#c0392b;
  --text:#1f2933;
  --muted:#64748b;
  --border:#d7dee6;
  --panel:#ffffff;
  --panel-soft:rgba(255,255,255,0.97);
  --shadow:0 14px 34px rgba(0,0,0,0.18);
}

body{
  margin:0;
  color:white;
  min-height:100vh;
  background:#3f454b;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(15,23,42,0.72), rgba(15,23,42,0.8)),
    var(--bgImage);
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  z-index:-2;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  background:linear-gradient(to bottom, rgba(255,255,255,0.03), rgba(0,0,0,0.14));
  z-index:-1;
}

.app-header{
  background:linear-gradient(90deg, rgba(244,180,0,0.97), rgba(224,164,0,0.97));
  color:#111;
  border-bottom:3px solid rgba(0,0,0,0.14);
  box-shadow:0 8px 24px rgba(0,0,0,0.16);
}

.header-inner{
  max-width:1060px;
  margin:0 auto;
  padding:20px 24px;
  display:grid;
  grid-template-columns:180px 1fr 180px;
  align-items:center;
  gap:16px;
}

.header-logo-box{
  display:flex;
  align-items:center;
}

.header-logo{
  max-width:140px;
  max-height:56px;
}

.header-title{
  text-align:center;
}

.header-title p{
  margin:0 0 4px 0;
  font-size:12px;
  font-weight:700;
  letter-spacing:1px;
  text-transform:uppercase;
}

.header-title h1{
  margin:0;
  font-size:28px;
}

.header-title .header-sub{
  margin-top:4px;
  font-size:13px;
  font-weight:600;
}

.header-status{
  display:flex;
  justify-content:flex-end;
}

.header-pill{
  padding:10px 16px;
  border-radius:999px;
  border:1px solid rgba(0,0,0,0.14);
  background:rgba(255,255,255,0.3);
  font-size:12px;
  font-weight:800;
  letter-spacing:0.7px;
}

.container{
  max-width:1060px;
  margin:30px auto;
  padding:0 20px 28px;
}

.form-shell{
  background:rgba(255,255,255,0.08);
  border-radius:20px;
  padding:20px;
}

.card{
  background:var(--panel-soft);
  color:var(--text);
  border-radius:16px;
  padding:22px;
  margin-bottom:20px;
  border:1px solid rgba(15,23,42,0.08);
  box-shadow:var(--shadow);
}

.card h2{
  margin:0 0 14px 0;
  font-size:19px;
  border-bottom:2px solid var(--primary);
  padding-bottom:8px;
}

.card-intro{
  margin:0 0 16px 0;
  color:var(--muted);
}

.form-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}

.form-group{
  display:flex;
  flex-direction:column;
}

label{
  font-weight:700;
  margin-bottom:6px;
}

input,select,textarea{
  width:100%;
  padding:13px;
  border-radius:10px;
  border:1px solid var(--border);
}

textarea{
  min-height:130px;
}

.check-list{
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
  background:#fff;
}

.check-item{
  display:grid;
  grid-template-columns:1fr auto;
  padding:16px 18px;
  border-bottom:1px solid #e8edf2;
}

.btn-group{
  display:flex;
  gap:10px;
}

.status-btn{
  border:2px solid #d6dde4;
  background:#fff;
  padding:10px 18px;
  border-radius:10px;
  font-weight:800;
  cursor:pointer;
  min-width:98px;
}

.status-btn.selected-ok{
  background:#e8f7ee;
  border-color:var(--success);
  color:var(--success);
}

.status-btn.selected-defect{
  background:#fdeaea;
  border-color:var(--danger);
  color:var(--danger);
}

.notes-warning{
  display:none;
  margin-top:12px;
  padding:11px;
  border-radius:10px;
  background:#fff4e5;
  border:1px solid #f3cf8b;
}

.submit-btn{
  width:100%;
  background:var(--primary);
  border:none;
  padding:17px;
  border-radius:12px;
  font-size:18px;
  font-weight:800;
  cursor:pointer;
}

.footer{
  text-align:center;
  font-size:12px;
  padding:10px 12px 22px;
  color:rgba(255,255,255,0.82);
}

.success-popup{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#1f8f4e;
  color:white;
  padding:20px 28px;
  border-radius:12px;
  font-weight:700;
  display:none;
}

</style>
</head>

<body>

<div class="app-header">

<div class="header-inner">

<div class="header-logo-box">
<img src="logo-placeholder.png" class="header-logo">
</div>

<div class="header-title">
<p>Site Safety Inspection Record</p>
<h1>Plant Pre-Start Inspection</h1>
<div class="header-sub">Daily Operator Machinery Check</div>
</div>

<div class="header-status">
<div class="header-pill">Inspection Form</div>
</div>

</div>
</div>

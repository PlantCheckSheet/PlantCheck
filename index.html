<script>
  const scriptURL = "https://script.google.com/macros/s/AKfycbxzMHPa2_qNk8Um6kyGfW6s7XVhlJpbN4syt_yZzbll7M11Sas8YcuSWhGqdrpprMHp/exec";

  const plantImages = {
    Excavator: "excavator.jpg",
    Dumper: "dumper.jpg",
    Roller: "roller.jpg",
    Telehandler: "telehandler.jpg",
    ADT: "adt.jpg",
    "Shovel Loader": "shovelloader.jpg",
    "Mobile Crane": "mobile-crane.jpg"
  };

  const plantTypeSelect = document.getElementById("plantType");
  const photoUpload = document.getElementById("photoUpload");
  const preview = document.getElementById("preview");
  const inspectionForm = document.getElementById("inspectionForm");

  function updateBackground(image) {
    let dynamicStyle = document.getElementById("dynamic-bg-style");

    if (!dynamicStyle) {
      dynamicStyle = document.createElement("style");
      dynamicStyle.id = "dynamic-bg-style";
      document.head.appendChild(dynamicStyle);
    }

    dynamicStyle.textContent = `
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.62)),
          url("${image}");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        z-index: -1;
        transition: background-image 0.3s ease;
      }
    `;
  }

  plantTypeSelect.addEventListener("change", function () {
    const type = this.value;
    const image = plantImages[type] || "excavator.jpg";
    updateBackground(image);
  });

  function setCheck(btn, value) {
    const container = btn.parentElement;
    const hidden = container.querySelector("input[type='hidden']");
    const buttons = container.querySelectorAll("button");

    hidden.value = value;
    buttons.forEach(b => b.classList.add("inactive"));
    btn.classList.remove("inactive");

    if (value === "Defect") {
      alert("⚠ DEFECT RECORDED\n\nPlease report this to the site supervisor.");
    }
  }

  photoUpload.addEventListener("change", function () {
    const file = this.files[0];
    if (file) {
      preview.src = URL.createObjectURL(file);
      preview.style.display = "block";
    } else {
      preview.style.display = "none";
      preview.removeAttribute("src");
    }
  });

  inspectionForm.addEventListener("submit", function (e) {
    e.preventDefault();

    let defectFound = false;

    document.querySelectorAll("input[type='hidden']").forEach(input => {
      if (input.value === "Defect") defectFound = true;
    });

    if (defectFound && photoUpload.files.length === 0) {
      alert("A defect was reported. Please upload a photo before submitting.");
      return;
    }

    const data = {
      operator: document.getElementById("operator").value,
      plantType: document.getElementById("plantType").value,
      machineID: document.getElementById("machineID").value,
      fluidLeaks: document.querySelector("[name='fluidLeaks']").value,
      hydraulicHoses: document.querySelector("[name='hydraulicHoses']").value,
      engineOil: document.querySelector("[name='engineOil']").value,
      coolant: document.querySelector("[name='coolant']").value,
      tracks: document.querySelector("[name='tracks']").value,
      lights: document.querySelector("[name='lights']").value,
      alarm: document.querySelector("[name='alarm']").value,
      controls: document.querySelector("[name='controls']").value,
      defectNotes: document.getElementById("defectNotes").value
    };

    fetch(scriptURL, {
      method: "POST",
      body: JSON.stringify(data),
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      }
    })
    .then(response => response.text())
    .then(() => {
      alert("Inspection submitted successfully.");
      inspectionForm.reset();
      preview.style.display = "none";
      preview.removeAttribute("src");

      document.querySelectorAll(".btn-group button").forEach(button => {
        button.classList.remove("inactive");
      });

      document.querySelectorAll("input[type='hidden']").forEach(input => {
        input.value = "";
      });

      updateBackground("excavator.jpg");
    })
    .catch(error => {
      console.error("Submission error:", error);
      alert("There was an error submitting the inspection.");
    });
  });
</script>

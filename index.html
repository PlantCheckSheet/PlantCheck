<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plant Inspection App</title>

<style>
*{box-sizing:border-box;font-family:"Segoe UI",Arial,sans-serif}

body{
margin:0;
color:white;
background-color:#4b4b4b;
min-height:100vh;
position:relative;
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.62)),
url("excavator.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
z-index:-1;
}

.app-header{
background:rgba(244,180,0,0.82);
color:#111;
padding:18px;
text-align:center;
font-weight:700;
font-size:22px;
box-shadow:0 4px 10px rgba(0,0,0,0.35);
}

.container{
max-width:760px;
margin:auto;
padding:20px;
}

.card{
background:rgba(255,255,255,0.78);
color:#333;
border-radius:14px;
padding:18px;
margin-bottom:20px;
box-shadow:0 12px 30px rgba(0,0,0,0.30);
}

.card h2{
margin-top:0;
border-bottom:2px solid rgba(244,180,0,0.9);
padding-bottom:8px;
}

label{font-weight:600}

input,select,textarea{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid rgba(0,0,0,0.12);
margin-top:4px;
margin-bottom:12px;
font-size:15px;
background:rgba(255,255,255,0.82);
}

.check-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 0;
border-bottom:1px solid rgba(0,0,0,0.08);
}

.btn-group{
display:flex;
gap:8px;
}

.btn-group button{
border:none;
padding:10px 14px;
border-radius:8px;
font-weight:700;
cursor:pointer;
min-width:78px;
}

.ok{background:#2ecc71;color:white}
.defect{background:#e74c3c;color:white}

.submit-btn{
width:100%;
background:rgba(244,180,0,0.88);
border:none;
padding:16px;
border-radius:10px;
font-size:18px;
font-weight:700;
cursor:pointer;
}

.photo-preview{
display:none;
margin-top:10px;
max-width:100%;
border-radius:10px;
}

.footer{
text-align:center;
font-size:12px;
opacity:0.9;
padding:12px;
}
</style>
</head>

<body>

<div class="app-header">🚧 Plant Pre-Start Inspection</div>

<div class="container">

<form id="inspectionForm"
method="POST"
action="https://script.google.com/macros/s/AKfycbxzMHPa2_qNk8Um6kyGfW6s7XVhlJpbN4syt_yZzbll7M11Sas8YcuSWhGqdrpprMHp/exec"
target="hiddenFrame">

<div class="card">
<h2>Operator Details</h2>

<label>Operator Name</label>
<input id="operator" name="operator" required>

<label>Plant Type</label>
<select id="plantType" name="plantType" required>
<option value="">Select Plant</option>
<option>Excavator</option>
<option>Dumper</option>
<option>Roller</option>
<option>Telehandler</option>
<option>ADT</option>
<option>Shovel Loader</option>
<option>Mobile Crane</option>
</select>

<label>Machine ID</label>
<input id="machineID" name="machineID" required>

</div>


<div class="card">
<h2>Machine Checks</h2>

<div class="check-item">
<div>Fluid Leaks</div>
<div class="btn-group">
<button type="button" class="ok" onclick="setCheck(this,'OK')">OK</button>
<button type="button" class="defect" onclick="setCheck(this,'Defect')">Defect</button>
<input type="hidden" name="fluidLeaks">
</div>
</div>

<div class="check-item">
<div>Hydraulic Hoses</div>
<div class="btn-group">
<button type="button" class="ok" onclick="setCheck(this,'OK')">OK</button>
<button type="button" class="defect" onclick="setCheck(this,'Defect')">Defect</button>
<input type="hidden" name="hydraulicHoses">
</div>
</div>

<div class="check-item">
<div>Engine Oil</div>
<div class="btn-group">
<button type="button" class="ok" onclick="setCheck(this,'OK')">OK</button>
<button type="button" class="defect" onclick="setCheck(this,'Defect')">Defect</button>
<input type="hidden" name="engineOil">
</div>
</div>

<div class="check-item">
<div>Coolant</div>
<div class="btn-group">
<button type="button" class="ok" onclick="setCheck(this,'OK')">OK</button>
<button type="button" class="defect" onclick="setCheck(this,'Defect')">Defect</button>
<input type="hidden" name="coolant">
</div>
</div>

<div class="check-item">
<div>Tracks / Tyres</div>
<div class="btn-group">
<button type="button" class="ok" onclick="setCheck(this,'OK')">OK</button>
<button type="button" class="defect" onclick="setCheck(this,'Defect')">Defect</button>
<input type="hidden" name="tracks">
</div>
</div>

<div class="check-item">
<div>Lights</div>
<div class="btn-group">
<button type="button" class="ok" onclick="setCheck(this,'OK')">OK</button>
<button type="button" class="defect" onclick="setCheck(this,'Defect')">Defect</button>
<input type="hidden" name="lights">
</div>
</div>

<div class="check-item">
<div>Horn / Alarm</div>
<div class="btn-group">
<button type="button" class="ok" onclick="setCheck(this,'OK')">OK</button>
<button type="button" class="defect" onclick="setCheck(this,'Defect')">Defect</button>
<input type="hidden" name="alarm">
</div>
</div>

<div class="check-item">
<div>Controls</div>
<div class="btn-group">
<button type="button" class="ok" onclick="setCheck(this,'OK')">OK</button>
<button type="button" class="defect" onclick="setCheck(this,'Defect')">Defect</button>
<input type="hidden" name="controls">
</div>
</div>

</div>


<div class="card">
<h2>Defect Report</h2>

<label>Describe Issue</label>
<textarea id="defectNotes" name="defectNotes"></textarea>

<label>Upload Photo (required if defect)</label>
<input type="file" id="photoUpload" accept="image/*">

<img id="preview" class="photo-preview">

</div>

<button class="submit-btn">Submit Inspection</button>

</form>

</div>

<div class="footer">Plant Inspection System</div>

<iframe name="hiddenFrame" style="display:none;"></iframe>

<script>

const photoUpload=document.getElementById("photoUpload")
const preview=document.getElementById("preview")
const inspectionForm=document.getElementById("inspectionForm")

function setCheck(btn,value){

const container=btn.parentElement
const hidden=container.querySelector("input")
const buttons=container.querySelectorAll("button")

hidden.value=value

buttons.forEach(b=>b.style.opacity=0.4)
btn.style.opacity=1

}

photoUpload.addEventListener("change",function(){

const file=this.files[0]

if(file){
preview.src=URL.createObjectURL(file)
preview.style.display="block"
}

})

inspectionForm.addEventListener("submit",function(e){

let defectFound=false

document.querySelectorAll("input[type='hidden']").forEach(input=>{
if(input.value==="Defect") defectFound=true
})

if(defectFound && photoUpload.files.length===0){
e.preventDefault()
alert("A defect was reported. Please upload a photo.")
return
}

alert("Inspection submitted successfully.")

setTimeout(()=>{
inspectionForm.reset()
preview.style.display="none"
},500)

})

</script>

</body>
</html>

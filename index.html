<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plant Pre-Start Inspection</title>

<style>

*{
box-sizing:border-box;
font-family:"Segoe UI", Arial, sans-serif;
}

:root{
--bgImage:url("excavator.jpg");
--primary:#f4b400;
--primary-dark:#c99200;
--success:#1f8f4e;
--danger:#c0392b;
--text:#1f2933;
--muted:#5b6770;
--border:#d8dee4;
--panel:#ffffff;
--panel-soft:rgba(255,255,255,0.96);
--shadow:0 12px 30px rgba(0,0,0,0.18);
}

body{
margin:0;
color:white;
min-height:100vh;
background:#3f454b;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
linear-gradient(rgba(15,23,42,0.72), rgba(15,23,42,0.78)),
var(--bgImage);
background-size:cover;
background-position:center;
background-repeat:no-repeat;
z-index:-2;
transition:background-image .4s ease;
}

.app-header{
position:relative;
padding:50px 24px;
border-bottom:3px solid rgba(0,0,0,0.14);
box-shadow:0 6px 18px rgba(0,0,0,0.14);
overflow:hidden;
background:linear-gradient(90deg, rgba(244,180,0,0.95), rgba(224,164,0,0.95));
}

/* faded logo background */

.header-logo-bg{
position:absolute;
inset:0;
background-image:url("logo-placeholder.png");
background-repeat:no-repeat;
background-position:center;
background-size:contain;
opacity:0.15;
pointer-events:none;
}

.header-inner{
position:relative;
max-width:860px;
margin:auto;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
gap:6px;
}

.header-title{
display:flex;
flex-direction:column;
gap:4px;
align-items:center;
text-align:center;
}

.header-title h1{
margin:0;
font-size:26px;
}

.header-title p{
margin:0;
font-size:13px;
font-weight:600;
letter-spacing:1px;
text-transform:uppercase;
}

.header-badge{
background:rgba(255,255,255,0.35);
border-radius:20px;
padding:6px 14px;
font-size:12px;
font-weight:700;
}

.container{
max-width:860px;
margin:28px auto;
padding:0 20px 28px;
}

.form-shell{
background:rgba(255,255,255,0.08);
border-radius:18px;
padding:18px;
}

.card{
background:var(--panel-soft);
color:var(--text);
border-radius:14px;
padding:20px;
margin-bottom:18px;
border:1px solid rgba(15,23,42,0.08);
box-shadow:var(--shadow);
}

.card h2{
margin:0 0 16px 0;
font-size:18px;
border-bottom:2px solid var(--primary);
padding-bottom:8px;
}

.form-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

.form-group{
display:flex;
flex-direction:column;
}

label{
font-weight:700;
margin-bottom:6px;
}

input,select,textarea{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
}

textarea{
min-height:120px;
}

.check-list{
border:1px solid var(--border);
border-radius:12px;
overflow:hidden;
background:#fff;
}

.check-item{
display:grid;
grid-template-columns:1fr auto;
padding:14px 16px;
border-bottom:1px solid #e8edf2;
}

.btn-group{
display:flex;
gap:10px;
}

.status-btn{
border:2px solid #cfd8df;
background:#fff;
padding:10px 16px;
border-radius:10px;
font-weight:800;
cursor:pointer;
min-width:90px;
}

.status-btn.selected-ok{
background:#e8f7ee;
border-color:var(--success);
color:var(--success);
}

.status-btn.selected-defect{
background:#fdeaea;
border-color:var(--danger);
color:var(--danger);
}

.submit-btn{
width:100%;
background:var(--primary);
border:none;
padding:16px;
border-radius:12px;
font-size:18px;
font-weight:800;
cursor:pointer;
}

.footer{
text-align:center;
font-size:12px;
padding:10px 12px 22px;
color:rgba(255,255,255,0.78);
}

.success-popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#1f8f4e;
color:white;
padding:20px 28px;
border-radius:12px;
font-weight:700;
display:none;
}

@media (max-width:780px){
.form-grid{grid-template-columns:1fr;}
}

</style>
</head>

<body>

<div class="app-header">

<div class="header-logo-bg"></div>

<div class="header-inner">

<div class="header-title">
<p>Site Safety Inspection Record</p>
<h1>Plant Pre-Start Inspection</h1>
</div>

<div class="header-badge">
YOUR LOGO HERE
</div>

</div>
</div>


<div class="container">
<div class="form-shell">

<form id="inspectionForm"
method="POST"
action="https://script.google.com/macros/s/AKfycbwdMdlfqh1XXkMMNzRUzAUfn8CxJFBPm0oBJW9XqlI1x1VJ6RaEU_LjWsv_VrPgJy84/exec"
target="hiddenFrame">

<div class="card">

<h2>Operator Details</h2>

<div class="form-grid">

<div class="form-group">
<label>Operator Name</label>
<input name="operator" required>
</div>

<div class="form-group">
<label>Plant Type</label>
<select id="plantType" name="plantType" required>

<option value="">Select Plant</option>
<option value="Excavator">Excavator</option>
<option value="Dumper">Dumper</option>
<option value="Roller">Roller</option>
<option value="Telehandler">Telehandler</option>
<option value="ADT">ADT</option>
<option value="Shovel Loader">Shovel Loader</option>
<option value="Mobile Crane">Mobile Crane</option>

</select>
</div>

<div class="form-group">
<label>Machine ID</label>
<input name="machineID" required>
</div>

</div>
</div>


<div class="card">

<h2>Machine Checks</h2>

<div class="check-list">

<div class="check-item">
<div>Fluid Leaks</div>
<div class="btn-group">
<button type="button" class="status-btn" onclick="setCheck(this,'OK')">OK</button>
<button type="button" class="status-btn" onclick="setCheck(this,'Defect')">Defect</button>
<input type="hidden" name="fluidLeaks">
</div>
</div>

<div class="check-item">
<div>Hydraulic Hoses</div>
<div class="btn-group">
<button type="button" class="status-btn" onclick="setCheck(this,'OK')">OK</button>
<button type="button" class="status-btn" onclick="setCheck(this,'Defect')">Defect</button>
<input type="hidden" name="hydraulicHoses">
</div>
</div>

<div class="check-item">
<div>Engine Oil</div>
<div class="btn-group">
<button type="button" class="status-btn" onclick="setCheck(this,'OK')">OK</button>
<button type="button" class="status-btn" onclick="setCheck(this,'Defect')">Defect</button>
<input type="hidden" name="engineOil">
</div>
</div>

<div class="check-item">
<div>Coolant</div>
<div class="btn-group">
<button type="button" class="status-btn" onclick="setCheck(this,'OK')">OK</button>
<button type="button" class="status-btn" onclick="setCheck(this,'Defect')">Defect</button>
<input type="hidden" name="coolant">
</div>
</div>

<div class="check-item">
<div>Tracks / Tyres</div>
<div class="btn-group">
<button type="button" class="status-btn" onclick="setCheck(this,'OK')">OK</button>
<button type="button" class="status-btn" onclick="setCheck(this,'Defect')">Defect</button>
<input type="hidden" name="tracks">
</div>
</div>

<div class="check-item">
<div>Lights</div>
<div class="btn-group">
<button type="button" class="status-btn" onclick="setCheck(this,'OK')">OK</button>
<button type="button" class="status-btn" onclick="setCheck(this,'Defect')">Defect</button>
<input type="hidden" name="lights">
</div>
</div>

<div class="check-item">
<div>Horn / Alarm</div>
<div class="btn-group">
<button type="button" class="status-btn" onclick="setCheck(this,'OK')">OK</button>
<button type="button" class="status-btn" onclick="setCheck(this,'Defect')">Defect</button>
<input type="hidden" name="alarm">
</div>
</div>

<div class="check-item">
<div>Controls</div>
<div class="btn-group">
<button type="button" class="status-btn" onclick="setCheck(this,'OK')">OK</button>
<button type="button" class="status-btn" onclick="setCheck(this,'Defect')">Defect</button>
<input type="hidden" name="controls">
</div>
</div>

</div>
</div>


<div class="card">
<h2>Defect Notes</h2>
<textarea id="defectNotes" name="defectNotes"></textarea>
</div>

<button class="submit-btn" type="submit">
Submit Inspection
</button>

</form>
</div>
</div>


<div class="footer">
Plant Inspection System
</div>

<div id="successPopup" class="success-popup">
Inspection Submitted Successfully ✔
</div>

<iframe id="hiddenFrame" name="hiddenFrame" style="display:none;"></iframe>

<script>

function setCheck(btn,value){

const container=btn.parentElement
const hidden=container.querySelector("input")

const buttons=container.querySelectorAll("button")

buttons.forEach(b=>b.classList.remove("selected-ok","selected-defect"))

if(value==="OK"){btn.classList.add("selected-ok")}
if(value==="Defect"){btn.classList.add("selected-defect")}

hidden.value=value

}

</script>

</body>
</html>

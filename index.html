<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plant Pre-Start Inspection</title>

<style>

*{
box-sizing:border-box;
font-family:"Segoe UI",Arial,sans-serif;
}

:root{
--bgImage:url("excavator.jpg");
--primary:#f4b400;
--primary-dark:#c99200;
--success:#2ecc71;
--danger:#e74c3c;
--text:#1f2933;
--muted:#64748b;
--border:#d7dee6;
--panel-soft:rgba(255,255,255,0.96);
--shadow:0 14px 34px rgba(0,0,0,0.18);
}

body{
margin:0;
color:white;
min-height:100vh;
background:#3f454b;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
linear-gradient(rgba(15,23,42,0.72), rgba(15,23,42,0.78)),
var(--bgImage);
background-size:cover;
background-position:center;
background-repeat:no-repeat;
z-index:-2;
transition:background-image .4s ease;
}

.app-header{
background:linear-gradient(90deg, rgba(244,180,0,0.97), rgba(224,164,0,0.97));
color:#111;
border-bottom:3px solid rgba(0,0,0,0.14);
box-shadow:0 8px 24px rgba(0,0,0,0.16);
text-align:center;
padding:22px;
}

.header-title p{
margin:0;
font-size:12px;
font-weight:700;
letter-spacing:1px;
text-transform:uppercase;
}

.header-title h1{
margin:4px 0;
font-size:28px;
}

.header-sub{
font-size:13px;
font-weight:600;
}

/* UPDATED LOGO SIZE */

.logo-section{
text-align:center;
padding:22px 0 12px 0;
}

.logo-section img{
max-width:420px;
width:100%;
height:auto;
display:block;
margin:auto;
object-fit:contain;
}

.container{
max-width:860px;
margin:28px auto;
padding:0 20px 28px;
}

.form-shell{
background:rgba(255,255,255,0.08);
border-radius:18px;
padding:18px;
}

.card{
background:var(--panel-soft);
color:var(--text);
border-radius:14px;
padding:20px;
margin-bottom:18px;
border:1px solid rgba(15,23,42,0.08);
box-shadow:var(--shadow);
}

.card h2{
margin:0 0 16px 0;
font-size:18px;
border-bottom:2px solid var(--primary);
padding-bottom:6px;
}

.card-intro{
margin:-6px 0 14px 0;
color:var(--muted);
font-size:14px;
}

.form-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
}

.form-group{
display:flex;
flex-direction:column;
}

label{
font-weight:700;
margin-bottom:6px;
}

input,select,textarea{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
}

textarea{
min-height:120px;
}

.check-list{
border:1px solid var(--border);
border-radius:12px;
overflow:hidden;
background:#fff;
}

.check-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 16px;
border-bottom:1px solid #e8edf2;
gap:12px;
}

.btn-group{
display:flex;
gap:8px;
}

.status-btn{
border:none;
padding:10px 14px;
border-radius:8px;
font-weight:700;
cursor:pointer;
min-width:80px;
}

.ok{
background:#2ecc71;
color:white;
}

.defect{
background:#e74c3c;
color:white;
}

.submit-btn{
width:100%;
background:#f4b400;
border:none;
padding:16px;
border-radius:10px;
font-size:18px;
font-weight:700;
cursor:pointer;
}

.submit-btn:disabled{
opacity:0.7;
cursor:not-allowed;
}

.footer{
text-align:center;
font-size:12px;
padding:12px;
}

.success-popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#2ecc71;
color:white;
padding:20px 28px;
border-radius:12px;
font-weight:600;
font-size:18px;
display:none;
box-shadow:0 10px 25px rgba(0,0,0,0.35);
z-index:999;
text-align:center;
}

@media (max-width:640px){
.form-grid{
grid-template-columns:1fr;
}
.check-item{
flex-direction:column;
align-items:stretch;
}
.btn-group{
width:100%;
}
.status-btn{
flex:1;
}
}

</style>
</head>

<body>

<div class="app-header">
<div class="header-title">
<p>Site Safety Inspection Record</p>
<h1>Plant Pre-Start Inspection</h1>
<div class="header-sub">Daily Operator Machinery Check</div>
</div>
</div>

<div class="logo-section">
<img src="mpttlogo.jpg" alt="Company Logo">
</div>

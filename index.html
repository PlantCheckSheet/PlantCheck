<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plant Inspection App</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      margin: 0;
      color: white;
      background-color: #4b4b4b;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.62)),
        url("excavator.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: -1;
      transition: background-image 0.3s ease;
    }

    .app-header {
      background: rgba(244, 180, 0, 0.82);
      color: #111;
      padding: 18px;
      text-align: center;
      font-weight: 700;
      font-size: 22px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.35);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-bottom: 1px solid rgba(255,255,255,0.25);
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.78);
      color: #333;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 20px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.30);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.38);
    }

    .card h2 {
      margin-top: 0;
      border-bottom: 2px solid rgba(244, 180, 0, 0.9);
      padding-bottom: 8px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(0,0,0,0.12);
      margin-top: 4px;
      margin-bottom: 12px;
      font-size: 15px;
      background: rgba(255,255,255,0.82);
      color: #222;
    }

    input::placeholder,
    textarea::placeholder {
      color: #666;
    }

    .check-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }

    .check-title {
      font-weight: 600;
      flex: 1;
    }

    .btn-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-group button {
      border: none;
      padding: 10px 14px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      min-width: 78px;
      transition: opacity 0.2s ease, transform 0.1s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .btn-group button:active {
      transform: scale(0.98);
    }

    .ok {
      background: #2ecc71;
      color: white;
    }

    .defect {
      background: #e74c3c;
      color: white;
    }

    .btn-group button.inactive {
      opacity: 0.4;
    }

    .submit-btn {
      width: 100%;
      background: rgba(244, 180, 0, 0.88);
      border: 1px solid rgba(255,255,255,0.28);
      padding: 16px;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      color: #111;
      box-shadow: 0 10px 24px rgba(0,0,0,0.22);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .submit-btn:hover {
      background: rgba(255, 204, 51, 0.92);
    }

    .photo-preview {
      display: none;
      margin-top: 10px;
      max-width: 100%;
      border-radius: 10px;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      opacity: 0.9;
      padding: 12px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }

    .note {
      font-size: 13px;
      color: #555;
      margin-top: -6px;
      margin-bottom: 12px;
    }

    @media (max-width: 640px) {
      .container {
        padding: 14px;
      }

      .card {
        background: rgba(255,255,255,0.72);
        padding: 16px;
      }

      .check-item {
        flex-direction: column;
        align-items: stretch;
      }

      .btn-group {
        justify-content: stretch;
      }

      .btn-group button {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <div class="app-header">🚧 Plant Pre-Start Inspection</div>

  <div class="container">
    <form id="inspectionForm">
      <div class="card">
        <h2>Operator Details</h2>

        <label for="operator">Operator Name</label>
        <input id="operator" required type="text" name="operator" />

        <label for="plantType">Plant Type</label>
        <select required name="plantType" id="plantType">
          <option value="">Select Plant</option>
          <option value="Excavator">Excavator</option>
          <option value="Dumper">Dumper</option>
          <option value="Roller">Roller</option>
        </select>

        <label for="machineID">Machine ID / Asset Number</label>
        <input id="machineID" required type="text" name="machineID" />
      </div>

      <div class="card">
        <h2>Machine Checks</h2>

        <div class="check-item">
          <div class="check-title">Fluid Leaks</div>
          <div class="btn-group">
            <button type="button" class="ok" onclick="setCheck(this,'OK')">OK</button>
            <button type="button" class="defect" onclick="setCheck(this,'Defect')">Defect</button>
            <input type="hidden" name="fluidLeaks" />
          </div>
        </div>

        <div class="check-item">
          <div class="check-title">Hydraulic Hoses</div>
          <div class="btn-group">
            <button type="button" class="ok" onclick="setCheck(this,'OK')">OK</button>
            <button type="button" class="defect" onclick="setCheck(this,'Defect')">Defect</button>
            <input type="hidden" name="hydraulicHoses" />
          </div>
        </div>

        <div class="check-item">
          <div class="check-title">Engine Oil</div>
          <div class="btn-group">
            <button type="button" class="ok" onclick="setCheck(this,'OK')">OK</button>
            <button type="button" class="defect" onclick="setCheck(this,'Defect')">Defect</button>
            <input type="hidden" name="engineOil" />
          </div>
        </div>

        <div class="check-item">
          <div class="check-title">Coolant Level</div>
          <div class="btn-group">
            <button type="button" class="ok" onclick="setCheck(this,'OK')">OK</button>
            <button type="button" class="defect" onclick="setCheck(this,'Defect')">Defect</button>
            <input type="hidden" name="coolant" />
          </div>
        </div>

        <div class="check-item">
          <div class="check-title">Tracks / Tyres</div>
          <div class="btn-group">
            <button type="button" class="ok" onclick="setCheck(this,'OK')">OK</button>
            <button type="button" class="defect" onclick="setCheck(this,'Defect')">Defect</button>
            <input type="hidden" name="tracks" />
          </div>
        </div>

        <div class="check-item">
          <div class="check-title">Lights</div>
          <div class="btn-group">
            <button type="button" class="ok" onclick="setCheck(this,'OK')">OK</button>
            <button type="button" class="defect" onclick="setCheck(this,'Defect')">Defect</button>
            <input type="hidden" name="lights" />
          </div>
        </div>

        <div class="check-item">
          <div class="check-title">Horn / Reverse Alarm</div>
          <div class="btn-group">
            <button type="button" class="ok" onclick="setCheck(this,'OK')">OK</button>
            <button type="button" class="defect" onclick="setCheck(this,'Defect')">Defect</button>
            <input type="hidden" name="alarm" />
          </div>
        </div>

        <div class="check-item">
          <div class="check-title">Controls</div>
          <div class="btn-group">
            <button type="button" class="ok" onclick="setCheck(this,'OK')">OK</button>
            <button type="button" class="defect" onclick="setCheck(this,'Defect')">Defect</button>
            <input type="hidden" name="controls" />
          </div>
        </div>
      </div>

      <div class="card">
        <h2>Defect Report</h2>

        <label for="defectNotes">Describe Issue</label>
        <textarea id="defectNotes" name="defectNotes"></textarea>

        <label for="photoUpload">Upload Photo (required if defect found)</label>
        <input type="file" id="photoUpload" accept="image/*" />

        <div class="note">Photo becomes mandatory if any check is marked as Defect.</div>

        <img id="preview" class="photo-preview" alt="Photo preview" />
      </div>

      <button class="submit-btn" type="submit">Submit Inspection</button>
    </form>
  </div>

  <div class="footer">Plant Inspection System</div>

  <script>
    const plantImages = {
      Excavator: "excavator.jpg",
      Dumper: "dumper.jpg",
      Roller: "roller.jpg"
    };

    const plantTypeSelect = document.getElementById("plantType");
    const photoUpload = document.getElementById("photoUpload");
    const preview = document.getElementById("preview");
    const inspectionForm = document.getElementById("inspectionForm");

    function updateBackground(image) {
      let dynamicStyle = document.getElementById("dynamic-bg-style");

      if (!dynamicStyle) {
        dynamicStyle = document.createElement("style");
        dynamicStyle.id = "dynamic-bg-style";
        document.head.appendChild(dynamicStyle);
      }

      dynamicStyle.textContent = `
        body::before {
          content: "";
          position: fixed;
          inset: 0;
          background:
            linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.62)),
            url("${image}");
          background-size: cover;
          background-position: center;
          background-repeat: no-repeat;
          z-index: -1;
          transition: background-image 0.3s ease;
        }
      `;
    }

    plantTypeSelect.addEventListener("change", function () {
      const type = this.value;
      const image = plantImages[type] || "excavator.jpg";
      updateBackground(image);
    });

    function setCheck(btn, value) {
      const container = btn.parentElement;
      const hidden = container.querySelector("input[type='hidden']");
      const buttons = container.querySelectorAll("button");

      hidden.value = value;

      buttons.forEach(b => b.classList.add("inactive"));
      btn.classList.remove("inactive");

      if (value === "Defect") {
        alert("⚠ DEFECT RECORDED\n\nPlease report this to the site supervisor.");
      }
    }

    photoUpload.addEventListener("change", function () {
      const file = this.files[0];
      if (file) {
        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";
      } else {
        preview.style.display = "none";
        preview.removeAttribute("src");
      }
    });

    inspectionForm.addEventListener("submit", function (e) {
      let defectFound = false;

      document.querySelectorAll("input[type='hidden']").forEach(input => {
        if (input.value === "Defect") defectFound = true;
      });

      if (defectFound && photoUpload.files.length === 0) {
        e.preventDefault();
        alert("A defect was reported. Please upload a photo before submitting.");
      }
    });
  </script>
</body>
</html>
